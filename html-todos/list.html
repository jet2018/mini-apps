<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todos · Chooga HTML</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topnav">
        <div class="brand">Chooga · HTML Todos</div>
        <nav class="nav-links">
          <a href="./index.html">Home</a>
          <a href="./list.html">List</a>
          <a href="./form.html">Add todo</a>
          <button type="button" class="secondary" id="btn-close">Close</button>
        </nav>
      </header>

      <main class="stack">
        <div>
          <h1>Todos</h1>
          <p class="muted">Data from jsonplaceholder.typicode.com/todos</p>
        </div>

        <div class="row">
          <label>
            Filter
            <select id="filter">
              <option value="all">All</option>
              <option value="open">Incomplete</option>
              <option value="done">Completed</option>
            </select>
          </label>
        </div>

        <p id="status" class="muted">Loading…</p>
        <div id="list" class="todo-list"></div>
      </main>
    </div>

    <script src="https://unpkg.com/@jetezra/bridge@0.0.2/dist/chooga-bridge.min.js"></script>
    <script src="./js/bridge.js"></script>
    <script src="./js/list.js"></script>
  </body>
</html>
