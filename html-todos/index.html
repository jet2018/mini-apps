<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chooga HTML Todos</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <main class="stack welcome-panel">
        <div class="panel stack">
          <p class="eyebrow">Chooga Todos</p>
          <h1>Welcome, <span id="welcome-name">there</span></h1>
          <p id="welcome-subtitle" class="muted">
            Choose how you want to continue.
          </p>
          <div class="choice-grid">
            <a class="button" href="./list.html">My todos</a>
            <a class="button secondary" href="./form.html">Add todo</a>
          </div>
          <button type="button" class="secondary" id="btn-close" hidden>
            Close mini-app
          </button>
        </div>
      </main>
    </div>

    <script src="https://unpkg.com/@jetezra/bridge@0.0.2/dist/chooga-bridge.min.js"></script>
    <script src="./js/bridge.js"></script>
    <script src="./js/welcome.js"></script>
  </body>
</html>
