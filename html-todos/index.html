<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tena Equb</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <main class="stack welcome-page">
        <div class="stack">
          <h1>Welcome, <span id="welcome-name">there</span></h1>
          <p id="welcome-subtitle" class="lede">
            Contribute to equb circles with your Awash PIN.
          </p>
        </div>
        <div class="menu-grid">
          <a class="menu-card" href="./list.html">
            <span class="menu-icon"><i data-lucide="users"></i></span>
            <span class="menu-copy">
              <strong>My equbs</strong>
              <span class="muted">Active circles &amp; dues</span>
            </span>
          </a>
          <a class="menu-card" href="./join.html">
            <span class="menu-icon"><i data-lucide="compass"></i></span>
            <span class="menu-copy">
              <strong>Browse &amp; join</strong>
              <span class="muted">Open savings circles</span>
            </span>
          </a>
        </div>
      </main>
    </div>

    <script src="https://unpkg.com/lucide@0.469.0"></script>
    <script src="https://unpkg.com/@jetezra/bridge@0.0.2/dist/chooga-bridge.min.js"></script>
    <script src="./js/bridge.js"></script>
    <script src="./js/nav.js"></script>
    <script src="./js/welcome.js"></script>
    <script>
      ChoogaNav.mount('home');
      if (window.lucide) lucide.createIcons({ attrs: { 'stroke-width': 2, width: 26, height: 26 } });
    </script>
  </body>
</html>
