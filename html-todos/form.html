<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contribute · Tena Equb</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <main class="stack">
        <a class="back-link" id="back-link" href="./list.html">
          <i data-lucide="arrow-left"></i>
          <span>Back</span>
        </a>
        <div class="panel stack">
          <p class="eyebrow">Round contribution</p>
          <h1 id="title">Contribute</h1>
          <p id="blurb" class="muted"></p>
          <p class="fare-lg" id="amount">—</p>
          <button type="button" id="pay-btn">Pay with Awash PIN</button>
          <p id="msg" class="muted tiny"></p>
        </div>
      </main>
    </div>

    <script src="https://unpkg.com/lucide@0.469.0"></script>
    <script src="https://unpkg.com/@jetezra/bridge@0.0.2/dist/chooga-bridge.min.js"></script>
    <script src="./js/bridge.js"></script>
    <script src="./js/data.js"></script>
    <script src="./js/nav.js"></script>
    <script src="./js/form.js"></script>
    <script>
      ChoogaNav.mount('list');
      if (window.lucide) lucide.createIcons({ attrs: { 'stroke-width': 2.1, width: 18, height: 18 } });
    </script>
  </body>
</html>
