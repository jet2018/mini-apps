<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add todo · Chooga HTML</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topnav">
        <div class="brand">Chooga · HTML Todos</div>
        <nav class="nav-links">
          <a href="./index.html">Home</a>
          <a href="./list.html">List</a>
          <a href="./form.html">Add todo</a>
          <button type="button" class="secondary" id="btn-close">Close</button>
        </nav>
      </header>

      <main class="stack">
        <a href="./list.html">← Back to list</a>
        <div class="panel stack">
          <h1>Add todo</h1>
          <p class="muted">
            Publishing as <span id="author-name">there</span> via the host-connected mini-app.
          </p>
          <form id="todo-form" class="stack">
            <label>
              Title
              <input id="title" name="title" required placeholder="Ship the mini-app demo" />
            </label>
            <label class="row" style="flex-direction: row; align-items: center">
              <input id="completed" name="completed" type="checkbox" />
              Mark completed
            </label>
            <button type="submit" id="submit-btn">Create todo</button>
          </form>
          <p id="error" class="error" hidden></p>
          <div id="result-wrap" hidden>
            <h3>Created</h3>
            <pre id="result"></pre>
          </div>
        </div>
      </main>
    </div>

    <script src="https://unpkg.com/@jetezra/bridge@0.0.2/dist/chooga-bridge.min.js"></script>
    <script src="./js/bridge.js"></script>
    <script src="./js/form.js"></script>
  </body>
</html>
